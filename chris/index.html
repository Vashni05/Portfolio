<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Portfolio</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
    <h2>MyPortfolio</h2>
    <ul>
        <li><a href="#home">Home</a></li>
        <li><a href="#about">About</a></li>
        <li><a href="#portfolio">Portfolio</a></li>
        <li><a href="#contact">Contact</a></li>
    </ul>
</nav>

<section id="home" class="hero">
    <div class="hero-text">
        <h1>Hello, I'm <span>Developer</span></h1>
        <p>Building modern web experiences</p>
    </div>
    <div class="hero-img">
        <img src="WhatsApp Image 2026-04-18 at 10.23.07 AM.jpeg" alt="profile">
    </div>
</section>

<section id="about">
    <h2>About Me</h2>
    <p>I am a passionate web developer focused on creating clean and responsive designs.</p>

    <div class="skills">
        <div>HTML</div>
        <div>CSS</div>
        <div>JavaScript</div>
        <div>Python</div>
    </div>
</section>

<section id="portfolio">
    <h2>Portfolio</h2>
    <div class="projects">
        <div class="card">Project 1</div>
        <div class="card">Project 2</div>
        <div class="card">Project 3</div>
        <div class="card">Project 4</div>
    </div>
</section>

<section id="contact">
    <h2>Contact Me</h2>
    <form id="form">
        <input type="text" placeholder="Name" required>
        <input type="email" placeholder="Email" required>
        <textarea placeholder="Message"></textarea>
        <button type="submit">Send</button>
    </form>
    <p id="msg"></p>
</section>

<script src="script.js"></script>
</body>
</html>
